<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>JSB 测试</title>
    <style>
        body { font-size: 24px; padding: 20px; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>JSB 接口测试结果</h1>
    <div id="result"></div>
    
    <script>
    // 立即执行，不需点击
    var html = '';
    
    // 1. pageType
    try {
        var pt = NadJsControl.pageType();
        html += '<p class="success">✅ pageType() = ' + pt + '</p>';
    } catch(e) {
        html += '<p class="error">❌ pageType() = ' + e.message + '</p>';
    }
    
    // 2. getSysHeight
    try {
        var h = NadJsControl.getSysHeight();
        html += '<p class="success">✅ getSysHeight() = "' + h + '"</p>';
    } catch(e) {
        html += '<p class="error">❌ getSysHeight() = ' + e.message + '</p>';
    }
    
    // 3. getPerformanceTiming
    try {
        NadJsControl.getPerformanceTiming('start');
        html += '<p class="success">✅ getPerformanceTiming("start") 执行成功</p>';
    } catch(e) {
        html += '<p class="error">❌ getPerformanceTiming() = ' + e.message + '</p>';
    }
    
    document.getElementById('result').innerHTML = html;
    
    // 强制弹出确认
    alert("测试完成，请查看页面结果");
    </script>
</body>
</html>
